# PR auto-heal — fleet-wide Codex handoff.
#
# This workflow scans every active repo under ANcpLua/* + O-ANcppLua/* every
# 15 minutes, finds PRs that are stuck (merge conflicts, failing required
# checks, or unresolved review gates), and posts one copyable Codex cloud
# handoff prompt.
#
# The official Codex GitHub integration supports @codex in PR comments, but
# this workflow does not pretend bot-authored comments are a guaranteed
# automation API. It surfaces the handoff and lets a human start the Codex
# cloud task from the PR.
#
# Secrets this workflow needs in github-settings-automation:
#   - REPO_SETTINGS_PAT_USER + REPO_SETTINGS_PAT_ORG (already set)
#     with Pull requests: Read and write + Issues: Read and write for
#     cross-repo PR lookup and comments.

name: PR auto-heal

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Specific PR to heal as owner/repo#N (leave blank to scan fleet)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: pr-heal-${{ github.event.inputs.target || 'fleet' }}
  cancel-in-progress: false

jobs:
  # ─── Job 0: auto-enable native auto-merge on trusted-author mergeable PRs ───
  #
  # The "owner forgets to click auto-merge" failure mode. Paperless#11/13/14
  # were all CLEAN MERGEABLE with no failing checks but sat open because
  # `autoMergeRequest` was null — nobody flipped the per-PR switch. Renovate
  # PRs auto-flip via `platformAutomerge: true`; everyone else has to remember.
  # This job removes the need to remember.
  auto-enable-merge:
    name: Auto-enable native auto-merge on trusted-author mergeable PRs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Scan + enable
        env:
          GH_TOKEN_USER: ${{ secrets.REPO_SETTINGS_PAT_USER }}
          GH_TOKEN_ORG: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -uo pipefail
          # Trusted-bot list — instant auto-merge OK, no cooldown needed.
          BOTS='^(renovate\[bot\]|dependabot\[bot\]|copilot\[bot\]|github-actions\[bot\])$'
          # Trusted-user list — author is a human (incl. agents acting via
          # ANcpLua's gh CLI auth). For these we enforce a cooldown window
          # so Codex review has time to land before we auto-flip merge-on-green.
          # Without this, a PR opened via
          # `gh CLI` on green CI fires Job 0 in the next 15-min sweep and
          # merges before a single reviewer comment ever appears (cf. PR#170
          # incident, 2026-05-18).
          USERS='^(ANcpLua)$'
          # Cooldown in seconds. 300 = 5 min covers Codex Code Review on push.
          COOLDOWN_SECONDS=300

          process_repo() {
            local repo="$1"
            gh pr list --repo "$repo" --state open --limit 100 \
              --json number,author,isDraft,mergeStateStatus,autoMergeRequest,createdAt 2>/dev/null \
              | jq -c '.[] | select(.isDraft == false) | select(.autoMergeRequest == null) | select(.mergeStateStatus == "CLEAN" or .mergeStateStatus == "UNSTABLE")' \
              | while read -r pr; do
                  author="$(jq -r '.author.login' <<<"$pr")"
                  n="$(jq -r '.number' <<<"$pr")"
                  state="$(jq -r '.mergeStateStatus' <<<"$pr")"
                  created_at="$(jq -r '.createdAt' <<<"$pr")"
                  if [[ "$author" =~ $BOTS ]]; then
                    : # bot — proceed immediately
                  elif [[ "$author" =~ $USERS ]]; then
                    age_seconds=$(( $(date -u +%s) - $(date -u -d "$created_at" +%s) ))
                    if [ "$age_seconds" -lt "$COOLDOWN_SECONDS" ]; then
                      echo "$repo#$n: cooldown — ${age_seconds}s old, waiting for reviewer-tier comments (next sweep in 15min)"
                      continue
                    fi
                  else
                    continue
                  fi
                  out="$(gh pr merge "$n" --repo "$repo" --auto --squash --delete-branch 2>&1)"
                  rc=$?
                  if [ $rc -eq 0 ]; then
                    echo "$repo#$n: auto-merge enabled (state=$state, author=$author)"
                  elif grep -q 'required protected branch rules' <<<"$out"; then
                    echo "::warning::$repo#$n: cannot enable native auto-merge — branch protection missing on default branch. Add minimal protection (require 1 status check) or this PR will need manual merge."
                  elif grep -q 'clean status' <<<"$out"; then
                    # CLEAN + no auto-merge needed → the PR is already mergeable right now.
                    # Native auto-merge can't enable on CLEAN PRs (would merge instantly anyway).
                    # We DON'T direct-merge from automation; owner can still push more commits.
                    echo "$repo#$n: ready to merge now (author can click 'Squash and merge', or push more if not done)"
                  else
                    echo "::warning::$repo#$n: gh pr merge --auto failed: $(head -c 200 <<<"$out")"
                  fi
                done
          }

          GH_TOKEN="$GH_TOKEN_USER" gh api --paginate "/user/repos?per_page=100" \
            --jq '.[] | select(.owner.login == "ANcpLua") | select(.archived == false) | select(.disabled == false) | select(.fork == false) | .full_name' \
            | while read -r repo; do
                [ -z "$repo" ] && continue
                GH_TOKEN="$GH_TOKEN_USER" process_repo "$repo"
              done

          GH_TOKEN="$GH_TOKEN_ORG" gh api --paginate "/orgs/O-ANcppLua/repos?per_page=100" \
            --jq '.[] | select(.archived == false) | select(.disabled == false) | select(.fork == false) | .full_name' \
            | while read -r repo; do
                [ -z "$repo" ] && continue
                GH_TOKEN="$GH_TOKEN_ORG" process_repo "$repo"
              done

  scan:
    name: Scan fleet for stuck PRs
    runs-on: ubuntu-latest
    outputs:
      targets_json: ${{ steps.find.outputs.targets_json }}
    steps:
      - name: Determine targets
        id: find
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
          GH_TOKEN_ORG: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
          EXPLICIT: ${{ inputs.target }}
        run: |
          set -euo pipefail
          if [ -n "${EXPLICIT:-}" ]; then
            # Format: owner/repo#N — explicit single-PR dispatch. Still
            # resolve actual mergeStateStatus so the strategy gates fire
            # correctly (BLOCKED → reviewer/status path, BEHIND/DIRTY → rebase
            # path). Use the owner-appropriate PAT so private repos work.
            repo="${EXPLICIT%#*}"
            pr="${EXPLICIT#*#}"
            owner="${repo%%/*}"
            case "$owner" in
              ANcpLua) tok="$GH_TOKEN" ;;
              O-ANcppLua) tok="$GH_TOKEN_ORG" ;;
              *) echo "::error::Unsupported owner: $owner"; exit 1 ;;
            esac
            state="$(GH_TOKEN="$tok" gh pr view "$pr" --repo "$repo" \
              --json mergeStateStatus --jq '.mergeStateStatus' 2>/dev/null || echo "UNKNOWN")"
            jq -nc --arg repo "$repo" --argjson pr "$pr" --arg why "$state" \
              '[{repo:$repo, pr:$pr, why:$why}]' > targets.json
          else
            # Fleet scan. A PR is "stuck" when ALL of:
            #   - state OPEN, not draft
            #   - auto-merge is enabled (signals "should merge") OR carries
            #     the `auto-resolve` label (explicit opt-in)
            #   - mergeStateStatus is BEHIND / DIRTY / BLOCKED / UNSTABLE
            #     (i.e. something concrete is blocking)
            collect_stuck() {
              local repo="$1"
              gh pr list --repo "$repo" --state open --limit 100 \
                --json number,mergeStateStatus,autoMergeRequest,labels,isDraft 2>/dev/null \
                | jq -c --arg repo "$repo" \
                  '.[] | select(.isDraft == false)
                       | select(.autoMergeRequest != null or (any(.labels[]?.name; . == "auto-resolve")))
                       | select(.mergeStateStatus == "BEHIND" or .mergeStateStatus == "DIRTY"
                              or .mergeStateStatus == "BLOCKED" or .mergeStateStatus == "UNSTABLE")
                       | {repo:$repo, pr:.number, why:.mergeStateStatus}' \
                || true
            }

            : > stuck.ndjson
            GH_TOKEN="$GH_TOKEN" gh api --paginate "/user/repos?per_page=100" \
              --jq '.[] | select(.owner.login == "ANcpLua") | select(.archived == false) | select(.disabled == false) | select(.fork == false) | .full_name' \
              | while read -r repo; do
                  [ -z "$repo" ] && continue
                  collect_stuck "$repo" >> stuck.ndjson
                done

            GH_TOKEN="$GH_TOKEN_ORG" gh api --paginate "/orgs/O-ANcppLua/repos?per_page=100" \
              --jq '.[] | select(.archived == false) | select(.disabled == false) | select(.fork == false) | .full_name' \
              | while read -r repo; do
                  [ -z "$repo" ] && continue
                  GH_TOKEN="$GH_TOKEN_ORG" collect_stuck "$repo" >> stuck.ndjson
                done

            jq -sc . stuck.ndjson > targets.json
          fi
          echo "Targets:"
          jq . targets.json
          echo "targets_json=$(jq -c . targets.json)" >> "$GITHUB_OUTPUT"

  handoff:
    name: Post Codex handoff for ${{ matrix.target.repo }}#${{ matrix.target.pr }}
    needs: scan
    if: needs.scan.outputs.targets_json != '[]' && needs.scan.outputs.targets_json != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        target: ${{ fromJSON(needs.scan.outputs.targets_json) }}
    permissions:
      pull-requests: write
    steps:
      # Codex cloud is the preferred remote GitHub repair path. We post a
      # copyable prompt instead of assuming workflow-authored comments are a
      # supported trigger for Codex cloud tasks.
      - name: Post Codex cloud handoff prompt
        id: codex_handoff
        continue-on-error: true
        env:
          GH_TOKEN: ${{ startsWith(matrix.target.repo, 'O-ANcppLua/') && secrets.REPO_SETTINGS_PAT_ORG || secrets.REPO_SETTINGS_PAT_USER }}
          REPO: ${{ matrix.target.repo }}
          PR: ${{ matrix.target.pr }}
          WHY: ${{ matrix.target.why }}
        run: |
          set -euo pipefail
          marker='<!-- pr-heal:codex-handoff -->'
          existing="$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq '[.[] | select(.body | contains("<!-- pr-heal:codex-handoff -->"))] | length' 2>/dev/null || echo 0)"
          if [ "${existing:-0}" != "0" ]; then
            echo "status=already-present" >> "$GITHUB_OUTPUT"
            echo "$REPO#$PR already has a Codex handoff prompt"
            exit 0
          fi
          body="$(cat <<EOF
          $marker
          ## pr-heal: Codex handoff prompt

          This PR is stuck at mergeStateStatus "$WHY".

          To start a Codex cloud repair task, copy this into a new PR comment:

          ~~~text
          @codex fix the merge blocker on this PR. Read AGENTS.md and code_review.md, reproduce the blocker with repo-local commands, make the smallest safe change, run the relevant checks, and push the fix back to this branch. If the blocker is external, comment with the exact command output that proves it.
          ~~~

          _Source: pr-heal.yml. This is a handoff prompt, not a guaranteed workflow API trigger._
          EOF
          )"
          gh api "repos/$REPO/issues/$PR/comments" --method POST \
            -f "body=$body" \
            --silent
          echo "status=posted" >> "$GITHUB_OUTPUT"
