# PR auto-heal — fleet-wide AI fallback chain.
#
# Mission (see qyl-self-healing-vision in CLAUDE memory):
# every "needs human" PR-merge gate is a defect. This workflow scans
# every active repo under ANcpLua/* + O-ANcppLua/* every 15 minutes,
# finds PRs that are stuck (merge conflicts, failing required checks,
# or sticky `CHANGES_REQUESTED` from a bot), and walks an AI provider
# fallback chain until one of them resolves the block.
#
# Provider chain (in order, falling through on 429 / unavailable):
#   1. CodeRabbit autofix — `@coderabbitai autofix` comment. Free,
#      uses CR's own quota; resolves CR-flagged review feedback.
#   2. Claude Code direct — `anthropics/claude-code-action@v1` running
#      against the PR's checkout. Resolves merge conflicts + CI fixes
#      autonomously with Anthropic quota.
#   3. (future) OpenAI Codex CLI on `OPENAI_API_KEY`.
#   4. (future) GitHub Copilot Workspace agent.
#
# Surfacing failure: if every provider 429s or genuinely fails, post a
# precise comment on the PR ("all four providers exhausted; next retry
# at $time") so the human-touch event is informed, not a mystery.
#
# Secrets this workflow needs in github-settings-automation:
#   - REPO_SETTINGS_PAT_USER + REPO_SETTINGS_PAT_ORG (already set)
#     with Pull requests: Read and write + Contents: Read and write
#     for cross-repo branch pushes and PR comments.
#   - CLAUDE_CODE_OAUTH_TOKEN — generated via `claude setup-token`.
#     Single token at the central repo replaces the per-repo secret
#     pattern in templates/refix.yml.

name: PR auto-heal

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Specific PR to heal as owner/repo#N (leave blank to scan fleet)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: pr-heal-${{ github.event.inputs.target || 'fleet' }}
  cancel-in-progress: false

jobs:
  # ─── Job 0: auto-enable native auto-merge on trusted-author mergeable PRs ───
  #
  # The "owner forgets to click auto-merge" failure mode. Paperless#11/13/14
  # were all CLEAN MERGEABLE with no failing checks but sat open because
  # `autoMergeRequest` was null — nobody flipped the per-PR switch. Renovate
  # PRs auto-flip via `platformAutomerge: true`; everyone else has to remember.
  # This job removes the need to remember.
  auto-enable-merge:
    name: Auto-enable native auto-merge on trusted-author mergeable PRs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Scan + enable
        env:
          GH_TOKEN_USER: ${{ secrets.REPO_SETTINGS_PAT_USER }}
          GH_TOKEN_ORG: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -uo pipefail
          TRUSTED='^(ANcpLua|renovate\[bot\]|dependabot\[bot\]|copilot\[bot\]|coderabbitai\[bot\]|jules\[bot\]|claude-code\[bot\]|github-actions\[bot\])$'
          enabled=0
          direct_merged=0
          skipped_no_protection=0

          process_repo() {
            local repo="$1"
            gh pr list --repo "$repo" --state open --limit 100 \
              --json number,author,isDraft,mergeStateStatus,autoMergeRequest 2>/dev/null \
              | jq -c '.[] | select(.isDraft == false) | select(.autoMergeRequest == null) | select(.mergeStateStatus == "CLEAN" or .mergeStateStatus == "UNSTABLE")' \
              | while read -r pr; do
                  author="$(jq -r '.author.login' <<<"$pr")"
                  n="$(jq -r '.number' <<<"$pr")"
                  state="$(jq -r '.mergeStateStatus' <<<"$pr")"
                  if ! [[ "$author" =~ $TRUSTED ]]; then
                    continue
                  fi
                  out="$(gh pr merge "$n" --repo "$repo" --auto --squash --delete-branch 2>&1)"
                  rc=$?
                  if [ $rc -eq 0 ]; then
                    echo "$repo#$n: auto-merge enabled (state=$state, author=$author)"
                  elif grep -q 'required protected branch rules' <<<"$out"; then
                    echo "::warning::$repo#$n: cannot enable native auto-merge — branch protection missing on default branch. Add minimal protection (require 1 status check) or this PR will need manual merge."
                  elif grep -q 'clean status' <<<"$out"; then
                    # CLEAN + no auto-merge needed → the PR is already mergeable right now.
                    # Native auto-merge can't enable on CLEAN PRs (would merge instantly anyway).
                    # We DON'T direct-merge from automation; owner can still push more commits.
                    echo "$repo#$n: ready to merge now (author can click 'Squash and merge', or push more if not done)"
                  else
                    echo "::warning::$repo#$n: gh pr merge --auto failed: $(head -c 200 <<<"$out")"
                  fi
                done
          }

          GH_TOKEN="$GH_TOKEN_USER" gh api --paginate "/user/repos?per_page=100" \
            --jq '.[] | select(.owner.login == "ANcpLua") | select(.archived == false) | select(.disabled == false) | .full_name' \
            | while read -r repo; do
                [ -z "$repo" ] && continue
                GH_TOKEN="$GH_TOKEN_USER" process_repo "$repo"
              done

          GH_TOKEN="$GH_TOKEN_ORG" gh api --paginate "/orgs/O-ANcppLua/repos?per_page=100" \
            --jq '.[] | select(.archived == false) | select(.disabled == false) | .full_name' \
            | while read -r repo; do
                [ -z "$repo" ] && continue
                GH_TOKEN="$GH_TOKEN_ORG" process_repo "$repo"
              done

  scan:
    name: Scan fleet for stuck PRs
    runs-on: ubuntu-latest
    outputs:
      targets_json: ${{ steps.find.outputs.targets_json }}
    steps:
      - name: Determine targets
        id: find
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
          GH_TOKEN_ORG: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
          EXPLICIT: ${{ inputs.target }}
        run: |
          set -euo pipefail
          if [ -n "${EXPLICIT:-}" ]; then
            # Format: owner/repo#N — explicit single-PR dispatch. Still
            # resolve actual mergeStateStatus so the strategy gates fire
            # correctly (BLOCKED → CR autofix path, BEHIND/DIRTY → rebase
            # path). Use the owner-appropriate PAT so private repos work.
            repo="${EXPLICIT%#*}"
            pr="${EXPLICIT#*#}"
            owner="${repo%%/*}"
            case "$owner" in
              ANcpLua) tok="$GH_TOKEN" ;;
              O-ANcppLua) tok="$GH_TOKEN_ORG" ;;
              *) echo "::error::Unsupported owner: $owner"; exit 1 ;;
            esac
            state="$(GH_TOKEN="$tok" gh pr view "$pr" --repo "$repo" \
              --json mergeStateStatus --jq '.mergeStateStatus' 2>/dev/null || echo "UNKNOWN")"
            jq -nc --arg repo "$repo" --argjson pr "$pr" --arg why "$state" \
              '[{repo:$repo, pr:$pr, why:$why}]' > targets.json
          else
            # Fleet scan. A PR is "stuck" when ALL of:
            #   - state OPEN, not draft
            #   - auto-merge is enabled (signals "should merge") OR carries
            #     the `auto-resolve` label (explicit opt-in)
            #   - mergeStateStatus is BEHIND / DIRTY / BLOCKED / UNSTABLE
            #     (i.e. something concrete is blocking)
            collect_stuck() {
              local repo="$1"
              gh pr list --repo "$repo" --state open --limit 100 \
                --json number,mergeStateStatus,autoMergeRequest,labels,isDraft 2>/dev/null \
                | jq -c --arg repo "$repo" \
                  '.[] | select(.isDraft == false)
                       | select(.autoMergeRequest != null or (any(.labels[]?.name; . == "auto-resolve")))
                       | select(.mergeStateStatus == "BEHIND" or .mergeStateStatus == "DIRTY"
                              or .mergeStateStatus == "BLOCKED" or .mergeStateStatus == "UNSTABLE")
                       | {repo:$repo, pr:.number, why:.mergeStateStatus}' \
                || true
            }

            : > stuck.ndjson
            GH_TOKEN="$GH_TOKEN" gh api --paginate "/user/repos?per_page=100" \
              --jq '.[] | select(.owner.login == "ANcpLua") | select(.archived == false) | select(.disabled == false) | .full_name' \
              | while read -r repo; do
                  [ -z "$repo" ] && continue
                  collect_stuck "$repo" >> stuck.ndjson
                done

            GH_TOKEN="$GH_TOKEN_ORG" gh api --paginate "/orgs/O-ANcppLua/repos?per_page=100" \
              --jq '.[] | select(.archived == false) | select(.disabled == false) | .full_name' \
              | while read -r repo; do
                  [ -z "$repo" ] && continue
                  GH_TOKEN="$GH_TOKEN_ORG" collect_stuck "$repo" >> stuck.ndjson
                done

            jq -sc . stuck.ndjson > targets.json
          fi
          echo "Targets:"
          jq . targets.json
          echo "targets_json=$(jq -c . targets.json)" >> "$GITHUB_OUTPUT"

  heal:
    name: Heal ${{ matrix.target.repo }}#${{ matrix.target.pr }}
    needs: scan
    if: needs.scan.outputs.targets_json != '[]' && needs.scan.outputs.targets_json != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        target: ${{ fromJSON(needs.scan.outputs.targets_json) }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Resolve owner-scoped token
        id: token
        env:
          REPO: ${{ matrix.target.repo }}
        run: |
          set -euo pipefail
          owner="${REPO%%/*}"
          case "$owner" in
            ANcpLua) echo "secret=REPO_SETTINGS_PAT_USER" >> "$GITHUB_OUTPUT" ;;
            O-ANcppLua) echo "secret=REPO_SETTINGS_PAT_ORG" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Unsupported owner: $owner"; exit 1 ;;
          esac

      # ─── Strategy 1: CodeRabbit autofix (free, fastest, narrowest) ──────
      # CR's autofix is good at responding to its own review feedback. It
      # cannot resolve merge conflicts, but if the block is BLOCKED with a
      # sticky CR review, asking CR to retry can shake it loose.
      - name: CodeRabbit autofix
        id: cr_autofix
        if: matrix.target.why == 'BLOCKED'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets[steps.token.outputs.secret] }}
          REPO: ${{ matrix.target.repo }}
          PR: ${{ matrix.target.pr }}
        run: |
          set -euo pipefail
          gh api "repos/$REPO/issues/$PR/comments" --method POST \
            -f "body=@coderabbitai autofix" \
            --silent && echo "cr_invoked=true" >> "$GITHUB_OUTPUT" \
                     || echo "cr_invoked=false" >> "$GITHUB_OUTPUT"

      # ─── Strategy 2: Claude Code direct ─────────────────────────────────
      # The heavy lifter. Checks out the PR branch, runs Claude with a
      # precise diagnostic prompt, lets it commit + push the fix. Works
      # for merge conflicts AND failing CI.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ matrix.target.repo }}
          token: ${{ secrets[steps.token.outputs.secret] }}
          fetch-depth: 0

      - name: Checkout the PR branch
        env:
          GH_TOKEN: ${{ secrets[steps.token.outputs.secret] }}
          PR: ${{ matrix.target.pr }}
        run: |
          set -euo pipefail
          gh pr checkout "$PR" --force

      - name: Configure git identity
        run: |
          git config user.name "github-settings-automation[bot]"
          git config user.email "automation+settings@ancplua.dev"

      - name: Claude Code — resolve block
        id: claude
        continue-on-error: true
        uses: anthropics/claude-code-action@b112a167ee1f4aa7ad2e3adae255c8c8c69e740b # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are running headless in CI. PR #${{ matrix.target.pr }} on
            ${{ matrix.target.repo }} is currently in mergeStateStatus
            "${{ matrix.target.why }}". The PR branch is checked out in
            the working directory and the local git is configured to push
            back to it.

            Your task:
            1. Diagnose what is blocking the merge:
               - BEHIND / DIRTY → the branch needs to absorb main. Rebase
                 onto the default branch and resolve any conflicts. Prefer
                 the PR's intent for behavioural code; prefer main for
                 unrelated infra/version bumps.
               - BLOCKED → required reviewer has CHANGES_REQUESTED, or a
                 required status check is failing. If the requested change
                 is bot-flagged and the new posture (CodeRabbit advisory,
                 see qyl-self-healing-vision in CLAUDE memory) makes the
                 verdict stale, leave it — the dismissal layer handles it.
                 If the required check is a real test failure, fix the
                 code so the test passes.
               - UNSTABLE → at least one required check failed. Inspect the
                 failure, fix the code, commit, push.
            2. Push the result to the PR branch (it is the current branch).
            3. Do NOT change the PR title/description and do NOT add new
               files outside the scope strictly needed to resolve the block.

            Hard constraints:
            - No --no-verify, no --force-with-lease against another author.
            - Run repo-local test/lint commands (the repo's CLAUDE.md, if
              present, lists them). Re-run them after your fix.
            - If you cannot resolve in <= 30 turns of work, exit and leave
              the branch as you found it (no half-fixes).

      # ─── Strategy 3 + 4 (future): Codex / Copilot agents ────────────────
      # When Claude exhausts quota (action exits non-zero with a 429-shape
      # message), this is where Codex (OPENAI_API_KEY) and Copilot
      # Workspace would be invoked in the same fallback pattern. Tracked
      # in qyl-self-healing-vision; add when the first 429 actually fires
      # so we have a real signature to detect.

      # ─── Surface result ─────────────────────────────────────────────────
      - name: Report outcome on the PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets[steps.token.outputs.secret] }}
          REPO: ${{ matrix.target.repo }}
          PR: ${{ matrix.target.pr }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
          CR_INVOKED: ${{ steps.cr_autofix.outputs.cr_invoked || 'skipped' }}
        run: |
          set -euo pipefail
          if [ "$CLAUDE_OUTCOME" = "success" ]; then
            echo "Healed ${REPO}#${PR} via Claude"
            exit 0
          fi
          # Genuine "all providers failed" surface. Make it a one-line
          # comment on the PR so the human-touch event is informed.
          gh api "repos/$REPO/issues/$PR/comments" --method POST \
            --silent \
            -f "body=pr-heal: providers tried — CodeRabbit autofix=${CR_INVOKED}, Claude=${CLAUDE_OUTCOME}. None resolved the block (state was ${{ matrix.target.why }}). Next sweep in 15 min; if this is recurring, the Codex/Copilot fallback tiers are tracked in [pr-heal.yml](https://github.com/ANcpLua/github-settings-automation/blob/main/.github/workflows/pr-heal.yml)." \
            || echo "::warning::Could not post outcome comment on $REPO#$PR"
