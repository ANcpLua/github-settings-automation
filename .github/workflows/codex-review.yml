# Codex review coverage — fleet-wide, posts as ANcpLua (not github-actions[bot]).
#
# Two responsibilities, both keyed to the Codex GitHub connector
# (chatgpt-codex-connector[bot]):
#
#   1. TRIGGER  — ensure every open, non-draft PR across ANcpLua/* and
#      O-ANcppLua/* (qyl included) gets a Codex review. The official trigger
#      is the exact string `@codex review` in a PR comment; Codex reacts 👀
#      and posts a review. We post that comment with REPO_SETTINGS_PAT_USER /
#      _ORG so the author is ANcpLua (a human collaborator), NOT
#      github-actions[bot] — the connector responds to mentions from a real
#      account, and bot-authored mentions are not a documented trigger.
#
#   2. THUMBS-UP — react 👍 to Codex's inline review comments so the
#      "code review reactions / feedback sentiment" insight registers the
#      reviews as landing. The reactions endpoint is idempotent per
#      (user, content), so re-running is a no-op.
#
# Usage discipline (don't burn Codex quota):
#   - We trigger ONLY when there is no Codex review at the current head SHA
#     AND we have not already requested one for that SHA (hidden marker
#     comment). New commits change the head SHA, which re-arms the trigger.
#   - A grace window lets Codex "Automatic reviews" (if enabled for the repo)
#     land its own review first, so we never double-review a fresh push.
#
# Tiering vs the other workflows:
#   - auto-merge.yml (per-repo)  — merges; never comments to Codex.
#   - pr-heal.yml (central cron) — repairs STUCK PRs via @codex fix handoff.
#   - THIS (central cron)        — review COVERAGE for every open PR + 👍.
#
# Secrets (already set in github-settings-automation):
#   REPO_SETTINGS_PAT_USER  — ANcpLua PAT, Pull requests + Issues read/write.
#   REPO_SETTINGS_PAT_ORG   — same scopes for O-ANcppLua/*.

name: Codex review coverage

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Specific PR to cover as owner/repo#N (blank = scan fleet)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: codex-review-${{ github.event.inputs.target || 'fleet' }}
  cancel-in-progress: false

jobs:
  cover:
    name: Ensure Codex review + 👍 across the fleet
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reviews and thumbs-up Codex comments
        env:
          GH_TOKEN_USER: ${{ secrets.REPO_SETTINGS_PAT_USER }}
          GH_TOKEN_ORG: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
          EXPLICIT: ${{ inputs.target }}
        run: |
          set -uo pipefail

          CONNECTOR='chatgpt-codex-connector[bot]'
          # Grace seconds: give Codex Automatic reviews time to land its own
          # review on a fresh push before we post an explicit @codex review.
          GRACE_SECONDS=600

          # React 👍 to every Codex inline review comment on a PR. Idempotent:
          # GitHub dedups reactions per (user, content), so re-POST is a no-op.
          thumbs_up() {
            local repo="$1" pr="$2"
            gh api "repos/$repo/pulls/$pr/comments" --paginate \
              --jq ".[] | select(.user.login == \"$CONNECTOR\") | .id" 2>/dev/null \
              | while read -r cid; do
                  [ -z "$cid" ] && continue
                  gh api "repos/$repo/pulls/comments/$cid/reactions" \
                    --method POST -f content='+1' --silent 2>/dev/null \
                    && echo "$repo#$pr: 👍 on review comment $cid" || true
                done
          }

          # Ensure a Codex review is requested for the PR's current head.
          ensure_review() {
            local repo="$1" pr="$2"
            local head reviewed requested committed age

            head="$(gh pr view "$pr" --repo "$repo" --json headRefOid \
              --jq '.headRefOid' 2>/dev/null || echo '')"
            if [ -z "$head" ]; then
              echo "::warning::$repo#$pr: could not resolve head SHA"
              return
            fi

            # Already reviewed at this exact commit → nothing to request.
            reviewed="$(gh api "repos/$repo/pulls/$pr/reviews" \
              --jq "[.[] | select(.user.login == \"$CONNECTOR\") | select(.commit_id == \"$head\")] | length" \
              2>/dev/null || echo 0)"
            if [ "${reviewed:-0}" != "0" ]; then
              echo "$repo#$pr: Codex already reviewed $head"
              thumbs_up "$repo" "$pr"
              return
            fi

            # Already asked for this commit → wait, don't spam a second request.
            requested="$(gh api "repos/$repo/issues/$pr/comments" --paginate \
              --jq "[.[] | select(.body | contains(\"codex-review:requested $head\"))] | length" \
              2>/dev/null || echo 0)"
            if [ "${requested:-0}" != "0" ]; then
              echo "$repo#$pr: review already requested for $head (awaiting Codex)"
              thumbs_up "$repo" "$pr"
              return
            fi

            # Grace: let Automatic reviews land first on a fresh push.
            committed="$(gh api "repos/$repo/commits/$head" \
              --jq '.commit.committer.date' 2>/dev/null || echo '')"
            if [ -n "$committed" ]; then
              age=$(( $(date -u +%s) - $(date -u -d "$committed" +%s) ))
              if [ "$age" -lt "$GRACE_SECONDS" ]; then
                echo "$repo#$pr: head $head is ${age}s old — grace window, waiting for auto-review"
                return
              fi
            fi

            # Post the documented trigger as ANcpLua, with a hidden per-SHA marker.
            body="$(printf '@codex review\n\n<!-- codex-review:requested %s -->' "$head")"
            if gh api "repos/$repo/issues/$pr/comments" --method POST \
                 -f "body=$body" --silent 2>/dev/null; then
              echo "$repo#$pr: posted @codex review for $head"
            else
              echo "::warning::$repo#$pr: failed to post @codex review"
            fi
          }

          # Walk every open, non-draft PR in a repo.
          process_repo() {
            local repo="$1"
            gh pr list --repo "$repo" --state open --limit 100 \
              --json number,isDraft \
              --jq '.[] | select(.isDraft == false) | .number' 2>/dev/null \
              | while read -r pr; do
                  [ -z "$pr" ] && continue
                  ensure_review "$repo" "$pr"
                done
          }

          # ── Explicit single-PR dispatch ──────────────────────────────────
          if [ -n "${EXPLICIT:-}" ]; then
            repo="${EXPLICIT%#*}"
            pr="${EXPLICIT#*#}"
            owner="${repo%%/*}"
            case "$owner" in
              ANcpLua)    export GH_TOKEN="$GH_TOKEN_USER" ;;
              O-ANcppLua) export GH_TOKEN="$GH_TOKEN_ORG" ;;
              *) echo "::error::Unsupported owner: $owner"; exit 1 ;;
            esac
            ensure_review "$repo" "$pr"
            exit 0
          fi

          # ── Fleet scan: ANcpLua/* (user) then O-ANcppLua/* (org, incl. qyl) ──
          GH_TOKEN="$GH_TOKEN_USER" gh api --paginate "/user/repos?per_page=100" \
            --jq '.[] | select(.owner.login == "ANcpLua") | select(.archived == false) | select(.disabled == false) | select(.fork == false) | .full_name' \
            | while read -r repo; do
                [ -z "$repo" ] && continue
                GH_TOKEN="$GH_TOKEN_USER" process_repo "$repo"
              done

          GH_TOKEN="$GH_TOKEN_ORG" gh api --paginate "/orgs/O-ANcppLua/repos?per_page=100" \
            --jq '.[] | select(.archived == false) | select(.disabled == false) | select(.fork == false) | .full_name' \
            | while read -r repo; do
                [ -z "$repo" ] && continue
                GH_TOKEN="$GH_TOKEN_ORG" process_repo "$repo"
              done
