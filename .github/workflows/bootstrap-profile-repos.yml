name: Bootstrap profile repos

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Validate user PAT
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "REPO_SETTINGS_PAT_USER secret is missing"
            exit 1
          fi
          gh api /user --jq .login

      - name: Validate org PAT
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "REPO_SETTINGS_PAT_ORG secret is missing"
            exit 1
          fi
          gh api /orgs/O-ANcppLua --jq .login

      - name: Personal profile README repo
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          set -uo pipefail
          if gh repo view ANcpLua/ANcpLua >/dev/null 2>&1; then
            echo "ANcpLua/ANcpLua already exists"
          elif gh repo create ANcpLua/ANcpLua --public --add-readme --description "Profile README"; then
            echo "Created ANcpLua/ANcpLua"
          elif gh repo view ANcpLua/ANcpLua >/dev/null 2>&1; then
            echo "ANcpLua/ANcpLua exists (create reported error but repo is present)"
          else
            echo "Failed to ensure ANcpLua/ANcpLua exists"
            exit 1
          fi

      - name: Org public overview repo
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -uo pipefail
          if gh repo view O-ANcppLua/.github >/dev/null 2>&1; then
            echo "O-ANcppLua/.github already exists"
          elif gh repo create O-ANcppLua/.github --public --add-readme --description "Organization profile README"; then
            echo "Created O-ANcppLua/.github"
          elif gh repo view O-ANcppLua/.github >/dev/null 2>&1; then
            echo "O-ANcppLua/.github exists (create reported error but repo is present)"
          else
            echo "Failed to ensure O-ANcppLua/.github exists"
            exit 1
          fi
