name: Enforce repository settings

on:
  schedule:
    - cron: "0 17 * * 1"
  workflow_dispatch:
    inputs:
      sweep_mode:
        description: "topic = curated fleet (ancplua-fleet topic, default); recent = last 8 days; full = every non-fork active repo"
        type: choice
        options:
          - topic
          - recent
          - full
        default: topic

permissions:
  contents: read

jobs:
  enforce-user:
    runs-on: ubuntu-latest
    steps:
      - name: Validate user PAT
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "REPO_SETTINGS_PAT_USER secret is missing"
            exit 1
          fi
          gh api /user --jq .login

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve target user repos
        id: targets
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
          SWEEP_MODE: ${{ inputs.sweep_mode || 'topic' }}
        run: |
          set -euo pipefail
          case "$SWEEP_MODE" in
            topic)
              echo "Mode: topic (ancplua-fleet curated repos)"
              gh api --paginate "/user/repos?sort=created&direction=desc&per_page=100" \
                --jq '.[] | select(.owner.login == "ANcpLua") | select(.archived == false) | select(.disabled == false) | select(.fork == false) | select((.topics // []) | any(. == "ancplua-fleet")) | .full_name' \
                > targets.txt
              ;;
            recent)
              SINCE="$(date -u -d '8 days ago' '+%Y-%m-%dT%H:%M:%SZ')"
              echo "Mode: recent (since $SINCE)"
              gh api --paginate "/user/repos?sort=created&direction=desc&per_page=100" \
                --jq ".[] | select(.owner.login == \"ANcpLua\") | select(.archived == false) | select(.disabled == false) | select(.fork == false) | select(.created_at >= \"$SINCE\") | .full_name" \
                > targets.txt
              ;;
            full)
              echo "Mode: full (every non-fork active ANcpLua/* repo)"
              gh api --paginate "/user/repos?sort=created&direction=desc&per_page=100" \
                --jq '.[] | select(.owner.login == "ANcpLua") | select(.archived == false) | select(.disabled == false) | select(.fork == false) | .full_name' \
                > targets.txt
              ;;
            *)
              echo "::error::Unknown sweep_mode: $SWEEP_MODE"
              exit 1
              ;;
          esac
          echo "Targets:"
          cat targets.txt

      - name: Patch repo settings (delete_branch_on_merge + allow_auto_merge)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            echo "Patching $repo"
            gh api "repos/$repo" --method PATCH --silent \
              -F delete_branch_on_merge=true \
              -F allow_auto_merge=true
          done < targets.txt

      # Single robust step covering all four cases: file-missing, file-present-stale,
      # ruleset-blocks-direct-write (PR fallback), already-advisory (no-op).
      # See scripts/sync-coderabbit-config.sh for the per-repo algorithm.
      - name: Sync .coderabbit.yaml (seed or flip request_changes_workflow)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            scripts/sync-coderabbit-config.sh "$repo" templates/coderabbit.yaml \
              || echo "::warning::sync-coderabbit-config.sh exited non-zero for $repo"
          done < targets.txt

      # Seed coderabbit-autofix.yml into every repo that has a .coderabbit.yaml
      # (i.e. repos where CR autofix would actually do something). Skip-if-exists
      # so per-repo customizations stay. Ruleset-protected repos warn and skip;
      # they can adopt manually or via a future PR-fallback.
      - name: Sync coderabbit-autofix.yml (seed if .coderabbit.yaml exists and workflow missing)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          set -uo pipefail
          [ -f templates/coderabbit-autofix.yml ] || { echo "templates/coderabbit-autofix.yml missing"; exit 1; }
          CONTENT_B64="$(base64 -w0 templates/coderabbit-autofix.yml)"
          while read -r repo; do
            [ -z "$repo" ] && continue
            # Only seed where CodeRabbit is actually configured
            if ! gh api "repos/$repo/contents/.coderabbit.yaml" --silent 2>/dev/null; then
              continue
            fi
            if gh api "repos/$repo/contents/.github/workflows/coderabbit-autofix.yml" --silent 2>/dev/null; then
              echo "Skip $repo — already has coderabbit-autofix.yml"
              continue
            fi
            echo "Seeding $repo with coderabbit-autofix.yml"
            gh api "repos/$repo/contents/.github/workflows/coderabbit-autofix.yml" --method PUT --silent \
              -f "message=chore: seed coderabbit-autofix.yml from github-settings-automation" \
              -f "content=$CONTENT_B64" \
              || echo "::warning::Failed to seed coderabbit-autofix.yml on $repo (ruleset or missing Workflows write scope on PAT)"
          done < targets.txt

      # Sync auto-merge.yml. Unlike the autofix above (skip-if-exists),
      # this REPLACES — the bug we fix here (the now-removed owner-clause
      # that caused PR#170 to merge before CodeRabbit could review) lives
      # in the existing per-repo files and must be overwritten. Skip repos
      # that don't already have an auto-merge.yml: we don't push the
      # workflow into repos that opted out.
      - name: Sync auto-merge.yml (replace if drifted from template)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          set -uo pipefail
          [ -f templates/auto-merge.yml ] || { echo "templates/auto-merge.yml missing"; exit 1; }
          CONTENT_B64="$(base64 -w0 templates/auto-merge.yml)"
          TEMPLATE_CONTENT="$(cat templates/auto-merge.yml)"
          while read -r repo; do
            [ -z "$repo" ] && continue
            current_sha="$(gh api "repos/$repo/contents/.github/workflows/auto-merge.yml" --jq '.sha' 2>/dev/null || true)"
            if [ -z "$current_sha" ] || [ "$current_sha" = "null" ]; then
              echo "Skip $repo — no auto-merge.yml (not seeding into repos that opted out)"
              continue
            fi
            current_content_b64="$(gh api "repos/$repo/contents/.github/workflows/auto-merge.yml" --jq '.content' 2>/dev/null || true)"
            current_content=""
            if [ -n "$current_content_b64" ] && [ "$current_content_b64" != "null" ]; then
              current_content="$(echo "$current_content_b64" | base64 -d 2>/dev/null || true)"
            fi
            if [ "$current_content" = "$TEMPLATE_CONTENT" ]; then
              echo "Skip $repo — auto-merge.yml already canonical"
              continue
            fi
            echo "Updating $repo's auto-merge.yml to canonical"
            gh api "repos/$repo/contents/.github/workflows/auto-merge.yml" --method PUT --silent \
              -f "message=chore: sync auto-merge.yml to canonical (remove owner-clause; cooldown lives in pr-heal.yml)" \
              -f "content=$CONTENT_B64" \
              -f "sha=$current_sha" \
              || echo "::warning::Failed to update auto-merge.yml on $repo (ruleset or PAT scope)"
          done < targets.txt

      # Seed triage-bot.yml. Skip-if-exists (per-repo PAT/App secret
      # makes this opt-in). The pattern: bot classifies unresolved review
      # threads, auto-resolves the non-blocking ones, leaves needs-human
      # threads to block native auto-merge via required_conversation_resolution.
      # Validated end-to-end in ANcpLua/triage-bot-playground (PR #1 + #2,
      # 2026-05-18).
      - name: Seed triage-bot.yml (skip if exists; opt-in via TRIAGE_PAT secret)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          set -uo pipefail
          [ -f templates/triage-bot.yml ] || { echo "templates/triage-bot.yml missing"; exit 1; }
          CONTENT_B64="$(base64 -w0 templates/triage-bot.yml)"
          while read -r repo; do
            [ -z "$repo" ] && continue
            if gh api "repos/$repo/contents/.github/workflows/triage-bot.yml" --silent 2>/dev/null; then
              echo "Skip $repo — already has triage-bot.yml"
              continue
            fi
            echo "Seeding $repo with triage-bot.yml"
            gh api "repos/$repo/contents/.github/workflows/triage-bot.yml" --method PUT --silent \
              -f "message=chore: seed triage-bot.yml from github-settings-automation (requires TRIAGE_PAT secret + required_conversation_resolution on default branch)" \
              -f "content=$CONTENT_B64" \
              || echo "::warning::Failed to seed triage-bot.yml on $repo (ruleset or PAT scope)"
          done < targets.txt

      # Ensure every fleet repo with renovate.json is in the Renovate App's
      # installation scope. Workflow files can be file-synced (above), but
      # App installation scope cannot — it's an API grant, not a file.
      # Without this step new repos receive renovate.json yet remain
      # invisible to Renovate (silent gap on
      # ANcpLua.OpenTelemetry.SemanticConventions.Analyzers tracked
      # 2026-05-25 — repo carried a valid renovate.json for weeks but
      # produced no PRs and no Dependency Dashboard issue).
      #
      # Installation id 79212889 is @ANcpLua's personal Renovate install
      # (https://github.com/settings/installations/79212889). The PUT
      # endpoint is idempotent — 204 whether newly added or already
      # present — so we don't pre-check membership. Listing installations
      # requires an App user-to-server token the PAT path can't issue,
      # hence the hardcoded id; revisit if Renovate is ever reinstalled.
      - name: Ensure fleet repos with renovate.json are in Renovate App scope
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
          RENOVATE_INSTALLATION_ID: "79212889"
        run: |
          set -uo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            if ! gh api "repos/$repo/contents/renovate.json" --silent 2>/dev/null; then
              continue
            fi
            repo_id="$(gh api "repos/$repo" --jq .id 2>/dev/null || true)"
            if [ -z "$repo_id" ] || [ "$repo_id" = "null" ]; then
              echo "::warning::Cannot resolve numeric id for $repo"
              continue
            fi
            if gh api --method PUT --silent \
                "/user/installations/$RENOVATE_INSTALLATION_ID/repositories/$repo_id" 2>/dev/null; then
              echo "Ensured Renovate scope for $repo (id $repo_id)"
            else
              echo "::warning::Failed to add $repo (id $repo_id) to Renovate scope"
            fi
          done < targets.txt

  enforce-org:
    runs-on: ubuntu-latest
    steps:
      - name: Validate org PAT
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "REPO_SETTINGS_PAT_ORG secret is missing"
            exit 1
          fi
          gh api /orgs/O-ANcppLua --jq .login

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve target org repos
        id: targets
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
          SWEEP_MODE: ${{ inputs.sweep_mode || 'topic' }}
        run: |
          set -euo pipefail
          case "$SWEEP_MODE" in
            topic)
              echo "Mode: topic (ancplua-fleet curated repos)"
              gh api --paginate "/orgs/O-ANcppLua/repos?sort=created&direction=desc&per_page=100" \
                --jq '.[] | select(.archived == false) | select(.disabled == false) | select(.fork == false) | select((.topics // []) | any(. == "ancplua-fleet")) | .full_name' \
                > targets.txt
              ;;
            recent)
              SINCE="$(date -u -d '8 days ago' '+%Y-%m-%dT%H:%M:%SZ')"
              echo "Mode: recent (since $SINCE)"
              gh api --paginate "/orgs/O-ANcppLua/repos?sort=created&direction=desc&per_page=100" \
                --jq ".[] | select(.archived == false) | select(.disabled == false) | select(.fork == false) | select(.created_at >= \"$SINCE\") | .full_name" \
                > targets.txt
              ;;
            full)
              echo "Mode: full (every non-fork active O-ANcppLua/* repo)"
              gh api --paginate "/orgs/O-ANcppLua/repos?sort=created&direction=desc&per_page=100" \
                --jq '.[] | select(.archived == false) | select(.disabled == false) | select(.fork == false) | .full_name' \
                > targets.txt
              ;;
            *)
              echo "::error::Unknown sweep_mode: $SWEEP_MODE"
              exit 1
              ;;
          esac
          echo "Targets:"
          cat targets.txt

      - name: Patch repo settings (delete_branch_on_merge + allow_auto_merge)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            echo "Patching $repo"
            gh api "repos/$repo" --method PATCH --silent \
              -F delete_branch_on_merge=true \
              -F allow_auto_merge=true
          done < targets.txt

      - name: Sync .coderabbit.yaml (seed or flip request_changes_workflow)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            case "$repo" in
              O-ANcppLua/.github|O-ANcppLua/.github-private) echo "Skip $repo — meta repo"; continue ;;
            esac
            scripts/sync-coderabbit-config.sh "$repo" templates/coderabbit.yaml \
              || echo "::warning::sync-coderabbit-config.sh exited non-zero for $repo"
          done < targets.txt

      - name: Sync coderabbit-autofix.yml (seed if .coderabbit.yaml exists and workflow missing)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -uo pipefail
          [ -f templates/coderabbit-autofix.yml ] || { echo "templates/coderabbit-autofix.yml missing"; exit 1; }
          CONTENT_B64="$(base64 -w0 templates/coderabbit-autofix.yml)"
          while read -r repo; do
            [ -z "$repo" ] && continue
            case "$repo" in
              O-ANcppLua/.github|O-ANcppLua/.github-private) continue ;;
            esac
            if ! gh api "repos/$repo/contents/.coderabbit.yaml" --silent 2>/dev/null; then
              continue
            fi
            if gh api "repos/$repo/contents/.github/workflows/coderabbit-autofix.yml" --silent 2>/dev/null; then
              echo "Skip $repo — already has coderabbit-autofix.yml"
              continue
            fi
            echo "Seeding $repo with coderabbit-autofix.yml"
            gh api "repos/$repo/contents/.github/workflows/coderabbit-autofix.yml" --method PUT --silent \
              -f "message=chore: seed coderabbit-autofix.yml from github-settings-automation" \
              -f "content=$CONTENT_B64" \
              || echo "::warning::Failed to seed coderabbit-autofix.yml on $repo (ruleset or missing Workflows write scope on PAT)"
          done < targets.txt

      - name: Sync auto-merge.yml (replace if drifted from template)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -uo pipefail
          [ -f templates/auto-merge.yml ] || { echo "templates/auto-merge.yml missing"; exit 1; }
          CONTENT_B64="$(base64 -w0 templates/auto-merge.yml)"
          TEMPLATE_CONTENT="$(cat templates/auto-merge.yml)"
          while read -r repo; do
            [ -z "$repo" ] && continue
            case "$repo" in
              O-ANcppLua/.github|O-ANcppLua/.github-private) continue ;;
            esac
            current_sha="$(gh api "repos/$repo/contents/.github/workflows/auto-merge.yml" --jq '.sha' 2>/dev/null || true)"
            if [ -z "$current_sha" ] || [ "$current_sha" = "null" ]; then
              echo "Skip $repo — no auto-merge.yml"
              continue
            fi
            current_content_b64="$(gh api "repos/$repo/contents/.github/workflows/auto-merge.yml" --jq '.content' 2>/dev/null || true)"
            current_content=""
            if [ -n "$current_content_b64" ] && [ "$current_content_b64" != "null" ]; then
              current_content="$(echo "$current_content_b64" | base64 -d 2>/dev/null || true)"
            fi
            if [ "$current_content" = "$TEMPLATE_CONTENT" ]; then
              echo "Skip $repo — auto-merge.yml already canonical"
              continue
            fi
            echo "Updating $repo's auto-merge.yml to canonical"
            gh api "repos/$repo/contents/.github/workflows/auto-merge.yml" --method PUT --silent \
              -f "message=chore: sync auto-merge.yml to canonical (owner-clause removed; cooldown lives in pr-heal.yml)" \
              -f "content=$CONTENT_B64" \
              -f "sha=$current_sha" \
              || echo "::warning::Failed to update auto-merge.yml on $repo (ruleset or PAT scope)"
          done < targets.txt

      - name: Seed triage-bot.yml (skip if exists; opt-in via TRIAGE_PAT secret)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -uo pipefail
          [ -f templates/triage-bot.yml ] || { echo "templates/triage-bot.yml missing"; exit 1; }
          CONTENT_B64="$(base64 -w0 templates/triage-bot.yml)"
          while read -r repo; do
            [ -z "$repo" ] && continue
            case "$repo" in
              O-ANcppLua/.github|O-ANcppLua/.github-private) continue ;;
            esac
            if gh api "repos/$repo/contents/.github/workflows/triage-bot.yml" --silent 2>/dev/null; then
              echo "Skip $repo — already has triage-bot.yml"
              continue
            fi
            echo "Seeding $repo with triage-bot.yml"
            gh api "repos/$repo/contents/.github/workflows/triage-bot.yml" --method PUT --silent \
              -f "message=chore: seed triage-bot.yml from github-settings-automation (requires TRIAGE_PAT secret + required_conversation_resolution on default branch)" \
              -f "content=$CONTENT_B64" \
              || echo "::warning::Failed to seed triage-bot.yml on $repo (ruleset or PAT scope)"
          done < targets.txt
