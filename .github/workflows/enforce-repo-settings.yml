name: Enforce repository settings

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      full_sweep:
        description: "Sweep ALL active repos (else just last 8 days)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  enforce-user:
    runs-on: ubuntu-latest
    steps:
      - name: Validate user PAT
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "REPO_SETTINGS_PAT_USER secret is missing"
            exit 1
          fi
          gh api /user --jq .login

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve target user repos
        id: targets
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
          FULL_SWEEP: ${{ inputs.full_sweep || 'false' }}
        run: |
          set -euo pipefail
          if [ "$FULL_SWEEP" = "true" ]; then
            echo "Mode: full sweep (all active ANcpLua/* repos)"
            gh api --paginate "/user/repos?sort=created&direction=desc&per_page=100" \
              --jq '.[] | select(.owner.login == "ANcpLua") | select(.archived == false) | select(.disabled == false) | .full_name' \
              > targets.txt
          else
            SINCE="$(date -u -d '8 days ago' '+%Y-%m-%dT%H:%M:%SZ')"
            echo "Mode: incremental (since $SINCE)"
            gh api --paginate "/user/repos?sort=created&direction=desc&per_page=100" \
              --jq ".[] | select(.owner.login == \"ANcpLua\") | select(.archived == false) | select(.disabled == false) | select(.created_at >= \"$SINCE\") | .full_name" \
              > targets.txt
          fi
          echo "Targets:"
          cat targets.txt

      - name: Patch repo settings (delete_branch_on_merge + allow_auto_merge)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            echo "Patching $repo"
            gh api "repos/$repo" --method PATCH --silent \
              -F delete_branch_on_merge=true \
              -F allow_auto_merge=true
          done < targets.txt

      # Single robust step covering all four cases: file-missing, file-present-stale,
      # ruleset-blocks-direct-write (PR fallback), already-advisory (no-op).
      # See scripts/sync-coderabbit-config.sh for the per-repo algorithm.
      - name: Sync .coderabbit.yaml (seed or flip request_changes_workflow)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            scripts/sync-coderabbit-config.sh "$repo" templates/coderabbit.yaml \
              || echo "::warning::sync-coderabbit-config.sh exited non-zero for $repo"
          done < targets.txt

      # Seed coderabbit-autofix.yml into every repo that has a .coderabbit.yaml
      # (i.e. repos where CR autofix would actually do something). Skip-if-exists
      # so per-repo customizations stay. Ruleset-protected repos warn and skip;
      # they can adopt manually or via a future PR-fallback.
      - name: Sync coderabbit-autofix.yml (seed if .coderabbit.yaml exists and workflow missing)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          set -uo pipefail
          [ -f templates/coderabbit-autofix.yml ] || { echo "templates/coderabbit-autofix.yml missing"; exit 1; }
          CONTENT_B64="$(base64 -w0 templates/coderabbit-autofix.yml)"
          while read -r repo; do
            [ -z "$repo" ] && continue
            # Only seed where CodeRabbit is actually configured
            if ! gh api "repos/$repo/contents/.coderabbit.yaml" --silent 2>/dev/null; then
              continue
            fi
            if gh api "repos/$repo/contents/.github/workflows/coderabbit-autofix.yml" --silent 2>/dev/null; then
              echo "Skip $repo — already has coderabbit-autofix.yml"
              continue
            fi
            echo "Seeding $repo with coderabbit-autofix.yml"
            gh api "repos/$repo/contents/.github/workflows/coderabbit-autofix.yml" --method PUT --silent \
              -f "message=chore: seed coderabbit-autofix.yml from github-settings-automation" \
              -f "content=$CONTENT_B64" \
              || echo "::warning::Failed to seed coderabbit-autofix.yml on $repo (ruleset or missing Workflows write scope on PAT)"
          done < targets.txt

  enforce-org:
    runs-on: ubuntu-latest
    steps:
      - name: Validate org PAT
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "REPO_SETTINGS_PAT_ORG secret is missing"
            exit 1
          fi
          gh api /orgs/O-ANcppLua --jq .login

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve target org repos
        id: targets
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
          FULL_SWEEP: ${{ inputs.full_sweep || 'false' }}
        run: |
          set -euo pipefail
          if [ "$FULL_SWEEP" = "true" ]; then
            echo "Mode: full sweep (all active O-ANcppLua/* repos)"
            gh api --paginate "/orgs/O-ANcppLua/repos?sort=created&direction=desc&per_page=100" \
              --jq '.[] | select(.archived == false) | select(.disabled == false) | .full_name' \
              > targets.txt
          else
            SINCE="$(date -u -d '8 days ago' '+%Y-%m-%dT%H:%M:%SZ')"
            echo "Mode: incremental (since $SINCE)"
            gh api --paginate "/orgs/O-ANcppLua/repos?sort=created&direction=desc&per_page=100" \
              --jq ".[] | select(.archived == false) | select(.disabled == false) | select(.created_at >= \"$SINCE\") | .full_name" \
              > targets.txt
          fi
          echo "Targets:"
          cat targets.txt

      - name: Patch repo settings (delete_branch_on_merge + allow_auto_merge)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            echo "Patching $repo"
            gh api "repos/$repo" --method PATCH --silent \
              -F delete_branch_on_merge=true \
              -F allow_auto_merge=true
          done < targets.txt

      - name: Sync .coderabbit.yaml (seed or flip request_changes_workflow)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            case "$repo" in
              O-ANcppLua/.github|O-ANcppLua/.github-private) echo "Skip $repo — meta repo"; continue ;;
            esac
            scripts/sync-coderabbit-config.sh "$repo" templates/coderabbit.yaml \
              || echo "::warning::sync-coderabbit-config.sh exited non-zero for $repo"
          done < targets.txt

      - name: Sync coderabbit-autofix.yml (seed if .coderabbit.yaml exists and workflow missing)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -uo pipefail
          [ -f templates/coderabbit-autofix.yml ] || { echo "templates/coderabbit-autofix.yml missing"; exit 1; }
          CONTENT_B64="$(base64 -w0 templates/coderabbit-autofix.yml)"
          while read -r repo; do
            [ -z "$repo" ] && continue
            case "$repo" in
              O-ANcppLua/.github|O-ANcppLua/.github-private) continue ;;
            esac
            if ! gh api "repos/$repo/contents/.coderabbit.yaml" --silent 2>/dev/null; then
              continue
            fi
            if gh api "repos/$repo/contents/.github/workflows/coderabbit-autofix.yml" --silent 2>/dev/null; then
              echo "Skip $repo — already has coderabbit-autofix.yml"
              continue
            fi
            echo "Seeding $repo with coderabbit-autofix.yml"
            gh api "repos/$repo/contents/.github/workflows/coderabbit-autofix.yml" --method PUT --silent \
              -f "message=chore: seed coderabbit-autofix.yml from github-settings-automation" \
              -f "content=$CONTENT_B64" \
              || echo "::warning::Failed to seed coderabbit-autofix.yml on $repo (ruleset or missing Workflows write scope on PAT)"
          done < targets.txt
