name: Enforce repository settings

on:
  schedule:
    - cron: "0 17 * * 1"
  workflow_dispatch:
    inputs:
      sweep_mode:
        description: "topic = curated fleet (qyl or ancplua-fleet topic, default); recent = last 8 days; full = every non-fork active repo"
        type: choice
        options:
          - topic
          - recent
          - full
        default: topic
      retired_review_cleanup_mode:
        description: "pull_request opens review PRs for retired reviewer cleanup; direct deletes on default branches when allowed"
        type: choice
        options:
          - pull_request
          - direct
        default: pull_request

permissions:
  contents: read

jobs:
  enforce-user:
    runs-on: ubuntu-latest
    steps:
      - name: Validate user PAT
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "REPO_SETTINGS_PAT_USER secret is missing"
            exit 1
          fi
          gh api /user --jq .login

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve target user repos
        id: targets
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
          SWEEP_MODE: ${{ inputs.sweep_mode || 'topic' }}
        run: |
          set -euo pipefail
          case "$SWEEP_MODE" in
            topic)
              echo "Mode: topic (qyl or ancplua-fleet curated repos)"
              gh api --paginate "/user/repos?sort=created&direction=desc&per_page=100" \
                --jq '.[] | select(.owner.login == "ANcpLua") | select(.archived == false) | select(.disabled == false) | select(.fork == false) | select((.topics // []) | any(. == "qyl" or . == "ancplua-fleet")) | .full_name' \
                > targets.txt
              ;;
            recent)
              SINCE="$(date -u -d '8 days ago' '+%Y-%m-%dT%H:%M:%SZ')"
              echo "Mode: recent (since $SINCE)"
              gh api --paginate "/user/repos?sort=created&direction=desc&per_page=100" \
                --jq ".[] | select(.owner.login == \"ANcpLua\") | select(.archived == false) | select(.disabled == false) | select(.fork == false) | select(.created_at >= \"$SINCE\") | .full_name" \
                > targets.txt
              ;;
            full)
              echo "Mode: full (every non-fork active ANcpLua/* repo)"
              gh api --paginate "/user/repos?sort=created&direction=desc&per_page=100" \
                --jq '.[] | select(.owner.login == "ANcpLua") | select(.archived == false) | select(.disabled == false) | select(.fork == false) | .full_name' \
                > targets.txt
              ;;
            *)
              echo "::error::Unknown sweep_mode: $SWEEP_MODE"
              exit 1
              ;;
          esac
          echo "Targets:"
          cat targets.txt

      - name: Remove retired review automation
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
          RETIRED_REVIEW_CLEANUP_WRITE_MODE: ${{ inputs.retired_review_cleanup_mode || 'pull_request' }}
          RETIRED_REVIEW_CLEANUP_AUTO_MERGE: "false"
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            scripts/remove-retired-review-automation.sh "$repo" \
              || echo "::warning::remove-retired-review-automation.sh exited non-zero for $repo"
          done < targets.txt

      - name: Patch repo settings (delete_branch_on_merge + allow_auto_merge)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            echo "Patching $repo"
            gh api "repos/$repo" --method PATCH --silent \
              -F delete_branch_on_merge=true \
              -F allow_auto_merge=true
          done < targets.txt

      # Force canonical branch-protection overrides from
      # templates/branch-protection.json onto every fleet repo's default
      # branch. Currently the only forced key is
      # `required_conversation_resolution: false`, which prevents lockouts
      # from orphaned bot review threads after a reviewer integration is
      # removed. Repos with no branch protection at all are skipped — the
      # sync HEALS existing protection but never AUTO-ENABLES protection on
      # a previously unprotected branch.
      - name: Sync branch protection (force canonical keys, preserve per-repo)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            scripts/sync-branch-protection.sh "$repo" main templates/branch-protection.json \
              || echo "::warning::sync-branch-protection.sh exited non-zero for $repo"
          done < targets.txt

      # Sync the canonical nuget-publish.yml workflow + NUGET_USER
      # secret into repos opted-in via scripts/drift-policy.yaml's
      # `nuget_publishers:` list. Eliminates per-repo authoring of
      # publish workflows. Each publisher gets the same tag-triggered
      # OIDC trusted-publishing pipeline; future bumps to action SHAs
      # or auth shape land once and propagate. NUGET_USER is the
      # nuget.org username (e.g. ANcpLua) used by NuGet/login@v1 during
      # the OIDC token exchange. See scripts/sync-nuget-publish.sh +
      # scripts/sync-nuget-secret.sh.
      - name: Sync nuget-publish.yml + NUGET_USER (opted-in repos)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
          NUGET_USER: ${{ secrets.NUGET_USER }}
        run: |
          set -euo pipefail
          # Extract repos under nuget_publishers: in drift-policy.yaml.
          # Awk avoids the pyyaml/yq dependency cliff on stock runners.
          awk '/^nuget_publishers:/{flag=1; next} /^[a-z_]+:/{flag=0} flag && /^  - /{gsub(/^  - /, ""); print}' \
            scripts/drift-policy.yaml > nuget-targets.txt
          if [ ! -s nuget-targets.txt ]; then
            echo "::notice::no repos in nuget_publishers: list; nuget sync skipped"
          else
            echo "NuGet publish targets:"
            cat nuget-targets.txt
            while read -r repo; do
              [ -z "$repo" ] && continue
              case "$repo" in ANcpLua/*) ;; *) continue ;; esac
              scripts/sync-nuget-publish.sh "$repo" templates/nuget-publish.yml \
                || echo "::warning::sync-nuget-publish.sh exited non-zero for $repo"
              scripts/sync-nuget-secret.sh "$repo" \
                || echo "::warning::sync-nuget-secret.sh exited non-zero for $repo"
            done < nuget-targets.txt
          fi

      - name: Sync Codex guidance (seed or update managed files)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            scripts/sync-codex-guidance.sh "$repo" templates/AGENTS.md templates/code_review.md \
              || echo "::warning::sync-codex-guidance.sh exited non-zero for $repo"
          done < targets.txt

      # Sync auto-merge.yml. Unlike the guidance sync above (skip-if-custom),
      # this REPLACES — the bug we fix here (the now-removed owner-clause
      # that caused PR#170 to merge before advisory review could land) lives
      # in the existing per-repo files and must be overwritten. Skip repos
      # that don't already have an auto-merge.yml: we don't push the
      # workflow into repos that opted out.
      - name: Sync auto-merge.yml (replace if drifted from template)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          set -uo pipefail
          [ -f templates/auto-merge.yml ] || { echo "templates/auto-merge.yml missing"; exit 1; }
          CONTENT_B64="$(base64 -w0 templates/auto-merge.yml)"
          TEMPLATE_CONTENT="$(cat templates/auto-merge.yml)"
          while read -r repo; do
            [ -z "$repo" ] && continue
            current_sha="$(gh api "repos/$repo/contents/.github/workflows/auto-merge.yml" --jq '.sha' 2>/dev/null || true)"
            if [ -z "$current_sha" ] || [ "$current_sha" = "null" ]; then
              echo "Skip $repo — no auto-merge.yml (not seeding into repos that opted out)"
              continue
            fi
            current_content_b64="$(gh api "repos/$repo/contents/.github/workflows/auto-merge.yml" --jq '.content' 2>/dev/null || true)"
            current_content=""
            if [ -n "$current_content_b64" ] && [ "$current_content_b64" != "null" ]; then
              current_content="$(echo "$current_content_b64" | base64 -d 2>/dev/null || true)"
            fi
            if [ "$current_content" = "$TEMPLATE_CONTENT" ]; then
              echo "Skip $repo — auto-merge.yml already canonical"
              continue
            fi
            echo "Updating $repo's auto-merge.yml to canonical"
            gh api "repos/$repo/contents/.github/workflows/auto-merge.yml" --method PUT --silent \
              -f "message=chore: sync auto-merge.yml to canonical (remove owner-clause; cooldown lives in pr-heal.yml)" \
              -f "content=$CONTENT_B64" \
              -f "sha=$current_sha" \
              || echo "::warning::Failed to update auto-merge.yml on $repo (ruleset or PAT scope)"
          done < targets.txt

  enforce-org:
    runs-on: ubuntu-latest
    steps:
      - name: Validate org PAT
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "REPO_SETTINGS_PAT_ORG secret is missing"
            exit 1
          fi
          gh api /orgs/O-ANcppLua --jq .login

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve target org repos
        id: targets
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
          SWEEP_MODE: ${{ inputs.sweep_mode || 'topic' }}
        run: |
          set -euo pipefail
          case "$SWEEP_MODE" in
            topic)
              echo "Mode: topic (qyl or ancplua-fleet curated repos)"
              gh api --paginate "/orgs/O-ANcppLua/repos?sort=created&direction=desc&per_page=100" \
                --jq '.[] | select(.archived == false) | select(.disabled == false) | select(.fork == false) | select((.topics // []) | any(. == "qyl" or . == "ancplua-fleet")) | .full_name' \
                > targets.txt
              ;;
            recent)
              SINCE="$(date -u -d '8 days ago' '+%Y-%m-%dT%H:%M:%SZ')"
              echo "Mode: recent (since $SINCE)"
              gh api --paginate "/orgs/O-ANcppLua/repos?sort=created&direction=desc&per_page=100" \
                --jq ".[] | select(.archived == false) | select(.disabled == false) | select(.fork == false) | select(.created_at >= \"$SINCE\") | .full_name" \
                > targets.txt
              ;;
            full)
              echo "Mode: full (every non-fork active O-ANcppLua/* repo)"
              gh api --paginate "/orgs/O-ANcppLua/repos?sort=created&direction=desc&per_page=100" \
                --jq '.[] | select(.archived == false) | select(.disabled == false) | select(.fork == false) | .full_name' \
                > targets.txt
              ;;
            *)
              echo "::error::Unknown sweep_mode: $SWEEP_MODE"
              exit 1
              ;;
          esac
          echo "Targets:"
          cat targets.txt

      - name: Remove retired review automation
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
          RETIRED_REVIEW_CLEANUP_WRITE_MODE: ${{ inputs.retired_review_cleanup_mode || 'pull_request' }}
          RETIRED_REVIEW_CLEANUP_AUTO_MERGE: "false"
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            case "$repo" in
              O-ANcppLua/.github|O-ANcppLua/.github-private) echo "Skip $repo — meta repo"; continue ;;
            esac
            scripts/remove-retired-review-automation.sh "$repo" \
              || echo "::warning::remove-retired-review-automation.sh exited non-zero for $repo"
          done < targets.txt

      - name: Patch repo settings (delete_branch_on_merge + allow_auto_merge)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            echo "Patching $repo"
            gh api "repos/$repo" --method PATCH --silent \
              -F delete_branch_on_merge=true \
              -F allow_auto_merge=true
          done < targets.txt

      # Same canonical branch-protection sweep as enforce-user (see that
      # job for full rationale). Org repos use REPO_SETTINGS_PAT_ORG; the
      # canonical template + script are shared.
      - name: Sync branch protection (force canonical keys, preserve per-repo)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            case "$repo" in
              O-ANcppLua/.github|O-ANcppLua/.github-private) echo "Skip $repo — meta repo"; continue ;;
            esac
            scripts/sync-branch-protection.sh "$repo" main templates/branch-protection.json \
              || echo "::warning::sync-branch-protection.sh exited non-zero for $repo"
          done < targets.txt

      # Org-scope twin of the nuget-publish sync. Reads the same
      # `nuget_publishers:` list but filters to O-ANcppLua/*.
      - name: Sync nuget-publish.yml + NUGET_USER (org publishers)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
          NUGET_USER: ${{ secrets.NUGET_USER }}
        run: |
          set -euo pipefail
          awk '/^nuget_publishers:/{flag=1; next} /^[a-z_]+:/{flag=0} flag && /^  - /{gsub(/^  - /, ""); print}' \
            scripts/drift-policy.yaml > nuget-targets.txt
          if [ ! -s nuget-targets.txt ]; then
            echo "::notice::no repos in nuget_publishers: list; nuget sync skipped"
          else
            while read -r repo; do
              [ -z "$repo" ] && continue
              case "$repo" in O-ANcppLua/*) ;; *) continue ;; esac
              scripts/sync-nuget-publish.sh "$repo" templates/nuget-publish.yml \
                || echo "::warning::sync-nuget-publish.sh exited non-zero for $repo"
              scripts/sync-nuget-secret.sh "$repo" \
                || echo "::warning::sync-nuget-secret.sh exited non-zero for $repo"
            done < nuget-targets.txt
          fi

      - name: Sync Codex guidance (seed or update managed files)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            case "$repo" in
              O-ANcppLua/.github|O-ANcppLua/.github-private) echo "Skip $repo — meta repo"; continue ;;
            esac
            scripts/sync-codex-guidance.sh "$repo" templates/AGENTS.md templates/code_review.md \
              || echo "::warning::sync-codex-guidance.sh exited non-zero for $repo"
          done < targets.txt

      - name: Sync auto-merge.yml (replace if drifted from template)
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -uo pipefail
          [ -f templates/auto-merge.yml ] || { echo "templates/auto-merge.yml missing"; exit 1; }
          CONTENT_B64="$(base64 -w0 templates/auto-merge.yml)"
          TEMPLATE_CONTENT="$(cat templates/auto-merge.yml)"
          while read -r repo; do
            [ -z "$repo" ] && continue
            case "$repo" in
              O-ANcppLua/.github|O-ANcppLua/.github-private) continue ;;
            esac
            current_sha="$(gh api "repos/$repo/contents/.github/workflows/auto-merge.yml" --jq '.sha' 2>/dev/null || true)"
            if [ -z "$current_sha" ] || [ "$current_sha" = "null" ]; then
              echo "Skip $repo — no auto-merge.yml"
              continue
            fi
            current_content_b64="$(gh api "repos/$repo/contents/.github/workflows/auto-merge.yml" --jq '.content' 2>/dev/null || true)"
            current_content=""
            if [ -n "$current_content_b64" ] && [ "$current_content_b64" != "null" ]; then
              current_content="$(echo "$current_content_b64" | base64 -d 2>/dev/null || true)"
            fi
            if [ "$current_content" = "$TEMPLATE_CONTENT" ]; then
              echo "Skip $repo — auto-merge.yml already canonical"
              continue
            fi
            echo "Updating $repo's auto-merge.yml to canonical"
            gh api "repos/$repo/contents/.github/workflows/auto-merge.yml" --method PUT --silent \
              -f "message=chore: sync auto-merge.yml to canonical (owner-clause removed; cooldown lives in pr-heal.yml)" \
              -f "content=$CONTENT_B64" \
              -f "sha=$current_sha" \
              || echo "::warning::Failed to update auto-merge.yml on $repo (ruleset or PAT scope)"
          done < targets.txt
