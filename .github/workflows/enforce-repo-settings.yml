name: Enforce repository settings

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enforce-user:
    runs-on: ubuntu-latest
    steps:
      - name: Validate user PAT
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "REPO_SETTINGS_PAT_USER secret is missing"
            exit 1
          fi

      - name: Patch recently-created personal repos
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_USER }}
        run: |
          set -euo pipefail
          SINCE="$(date -u -d '8 days ago' '+%Y-%m-%dT%H:%M:%SZ')"
          echo "Cutoff: $SINCE"
          gh api --paginate "/user/repos?sort=created&direction=desc&per_page=100" \
            --jq ".[] | select(.owner.login == \"ANcpLua\") | select(.created_at >= \"$SINCE\") | .full_name" \
          | while read -r repo; do
              [ -z "$repo" ] && continue
              echo "Patching $repo"
              gh api "repos/$repo" --method PATCH \
                -F delete_branch_on_merge=true \
                -F allow_auto_merge=true
            done

  enforce-org:
    runs-on: ubuntu-latest
    steps:
      - name: Validate org PAT
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "REPO_SETTINGS_PAT_ORG secret is missing"
            exit 1
          fi

      - name: Patch recently-created org repos
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT_ORG }}
        run: |
          set -euo pipefail
          SINCE="$(date -u -d '8 days ago' '+%Y-%m-%dT%H:%M:%SZ')"
          echo "Cutoff: $SINCE"
          gh api --paginate "/orgs/O-ANcppLua/repos?sort=created&direction=desc&per_page=100" \
            --jq ".[] | select(.created_at >= \"$SINCE\") | .full_name" \
          | while read -r repo; do
              [ -z "$repo" ] && continue
              echo "Patching $repo"
              gh api "repos/$repo" --method PATCH \
                -F delete_branch_on_merge=true \
                -F allow_auto_merge=true
            done
