name: Enforce repository settings

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - name: Validate token
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "REPO_SETTINGS_PAT secret is missing"
            exit 1
          fi

      - name: Patch recently-created repositories
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_PAT }}
        run: |
          set -euo pipefail

          SINCE="$(date -u -d '8 days ago' '+%Y-%m-%dT%H:%M:%SZ')"
          echo "Cutoff: $SINCE"

          patch_repo() {
            local repo="$1"
            echo "Patching $repo"
            gh api "repos/$repo" --method PATCH \
              -F delete_branch_on_merge=true \
              -F allow_auto_merge=true
          }

          {
            gh api --paginate "/user/repos?sort=created&direction=desc&per_page=100" \
              --jq ".[] | select(.owner.login == \"ANcpLua\") | select(.created_at >= \"$SINCE\") | .full_name"
            gh api --paginate "/orgs/O-ANcppLua/repos?sort=created&direction=desc&per_page=100" \
              --jq ".[] | select(.created_at >= \"$SINCE\") | .full_name"
          } | sort -u | while read -r repo; do
            if [ -n "$repo" ]; then
              patch_repo "$repo"
            fi
          done
