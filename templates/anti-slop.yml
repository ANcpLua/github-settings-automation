# Template: copy this file into a target repo at .github/workflows/anti-slop.yml
#
# Synced by .github/workflows/enforce-repo-settings.yml. Pinned by SHA on
# every refresh — never @v0 / floating tags (supply-chain risk for a
# third-party action with pull-request write permission).
#
# Audit posture: keep close-pr: false for at least two weeks after first
# adoption in a repo. Audit which of your own PRs would have been closed
# before flipping to true.

name: anti-slop

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  anti-slop:
    runs-on: ubuntu-latest
    steps:
      - uses: peakoss/anti-slop@2ee02d20c2c191bd278ec159610c4c505c909723 # v0.3.0
        with:
          max-failures: 4
          close-pr: false
