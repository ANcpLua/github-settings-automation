# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# ═══════════════════════════════════════════════════════════════════════════
# FROZEN — CodeRabbit DISABLED across ANcpLua + O-ANcppLua (2026-05-25)
# ═══════════════════════════════════════════════════════════════════════════
# CodeRabbit was uninstalled from both the personal account and the
# ANcpLua/O-ANcppLua organizations. This file is intentionally NOT being
# synced to consumer repos until CR is re-enabled. The user (ancplua) will
# manually re-enable next month when funds are restored.
#
# Why frozen, not deleted: keeping v2 content intact means re-enabling is a
# one-step revert (delete this banner + re-trigger
# enforce-repo-settings.yml). Re-authoring would lose the retry-loop fix
# and the autofix recipes below.
#
# Incident that triggered the freeze:
#   On ANcpLua.Analyzers PR #174 the CR autofix bot pushed commit 2fe348d
#   bumping <ANcpLuaAnalyzersVersion> from 1.29.4 (the deliberate
#   "last-PUBLISHED" self-reference) to 2.0.0 (the not-yet-published
#   version this PR PRODUCES). That broke restore with NU1102 because
#   ANcpLua.Analyzers 2.0.0 doesn't exist on nuget.org yet. The autofix
#   bot conflated VersionPrefix (the version BUILT) with
#   ANcpLuaAnalyzersVersion (the version CONSUMED for self-injection)
#   despite the in-file comment warning against exactly that.
#
# Re-enable runbook (when funds restored):
#   1. Confirm GitHub Actions billing is restored
#      (github-settings-automation runs are private-repo billable —
#      consider `gh repo edit ANcpLua/github-settings-automation
#      --visibility public --accept-visibility-change-consequences`
#      since this repo holds no secrets, just policy YAML).
#   2. Decide on autofix posture — current v2 has aggressive autofix
#      recipes (finishing_touches.custom) that caused the incident above.
#      Consider one of:
#      a) Add `path_filters: ['!**/Version.props', '!**/Directory.Build.props']`
#         under `reviews:` to exclude infra files from CR's view.
#      b) Delete the finishing_touches.custom recipes; keep CR
#         comment-only, no auto-pushed commits.
#      c) Reinstall CR on a plan tier without autofix.
#   3. Delete this FROZEN banner block (this comment region).
#   4. Re-trigger `enforce-repo-settings.yml --field sweep_mode=full`
#      to propagate to consumer repos.
# ═══════════════════════════════════════════════════════════════════════════
#
# Canonical CodeRabbit baseline for ANcpLua + O-ANcppLua repos.
# Synced into target repos by .github/workflows/enforce-repo-settings.yml.
#
# Posture: advisory, never blocking. CodeRabbit comments on every PR but
# does NOT submit formal CHANGES_REQUESTED reviews and is NOT a required
# reviewer at the branch-protection level. Merges go through GitHub native
# auto-merge driven by Renovate's `platformAutomerge: true` (see
# ANcpLua/github-settings-automation — default.json preset, merged from
# the archived ANcpLua/renovate-config repo) plus per-PR opt-in for
# human-authored work.
#
# Why this shape:
#   - Sticky CHANGES_REQUESTED reviews from CodeRabbit were the only reason
#     the legacy destructive-auto-merge.yml workflow needed --admin bypass.
#     Removing the formal-review path removes the need for the bypass.
#   - Tools and slop detection stay on — the review value is in the
#     comments, not in the gate.
#
# Per-repo overrides: drop a `.coderabbit.yaml` in the target repo to
# override anything below. Repos with bespoke path_instructions (e.g. qyl)
# carry their own file; this template is the default for everything else.
#
# v2 (2026-05-25) — fixes the retry-loop bug observed on
# ANcpLua.Analyzers PR #174 (CR stuck 3+ hours in "Failed to post review
# comments" loop) and adds Pro+ autofix-first recipes:
#   - disable_cache: true -> false           (5-30x speedup on assertive)
#   - auto_apply_labels EXPLICIT false       (prevents label-event review re-fires)
#   - path_filters: +9 entries               (snupkg/nupkg/sarif/trx/release-artifacts/
#                                             Snapshots/AnalyzerReleases.md noise)
#   - finishing_touches.custom: 5 recipes    (autofix XML docs, sync-over-async,
#                                             missing tests, simplifications, security)
#   - knowledge_base.code_guidelines: +6 patterns
#                                            (Directory.Build.props, Version.props,
#                                             README.md, docs/**, package.json, etc.)

language: en-US
tone_instructions: >-
  Principal-level stewardship. Architecture, maintainability, correctness only.
  Flag duplication, spec drift, silent behavior changes. No praise. No nits.
early_access: true
enable_free_tier: false

reviews:
  profile: assertive

  # Advisory, not blocking. The defining choice of this template.
  request_changes_workflow: false

  high_level_summary: true
  high_level_summary_in_walkthrough: true
  auto_title_instructions: >-
    Use conventional commits format with area prefix. Keep under 72 characters.
    No periods. Examples: feat(api): add endpoint, fix(build): pin SDK.
  review_status: true
  review_details: true
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  # v2 FIX: keep label SUGGESTIONS in the walkthrough but never let CR mutate
  # the PR's label set itself. auto_apply_labels: true + many labeling_instructions
  # caused a label-event review-retry loop that deadlocked PR #174 for 3+ hours.
  suggested_labels: true
  auto_apply_labels: false
  suggested_reviewers: true
  auto_assign_reviewers: false
  in_progress_fortune: false
  poem: false
  enable_prompt_for_ai_agents: true
  abort_on_close: true
  # v2 FIX: prior `true` forced every review cold-start; assertive profile
  # is 5-30x faster cache-warm.
  disable_cache: false

  slop_detection:
    enabled: true
    label: 'review:slop'

  # v2 EXPAND: exclude noise at FILTER level so CR never has to walk it.
  # Avoids the "review of a 5.6 MB embedded JSON" failure mode large
  # analyzer/source-gen repos hit.
  path_filters:
    # Generated source
    - '!**/*.g.cs'
    - '!**/*.g.ts'
    - '!**/*.g.sql'
    - '!**/*.g.tsp'
    - '!**/*.Designer.cs'
    - '!**/*.generated.*'
    - '!**/Generated/**'
    - '!**/generated/**'
    # Build outputs + artifacts
    - '!**/bin/**'
    - '!**/obj/**'
    - '!**/dist/**'
    - '!**/artifacts/**'
    - '!Artifacts/**'
    - '!**/release-artifacts/**'
    - '!**/coverage/**'
    # JS noise + lockfiles
    - '!**/node_modules/**'
    - '!**/*.min.js'
    - '!**/*.min.css'
    - '!**/package-lock.json'
    - '!**/pnpm-lock.yaml'
    - '!**/yarn.lock'
    # CI reports + packages
    - '!**/*.sarif'
    - '!**/*.trx'
    - '!**/*.nupkg'
    - '!**/*.snupkg'
    # Snapshot fixtures (byte-identity tests — no review value)
    - '!**/Snapshots/**/*.expected.txt'
    # Machine-generated catalogs (per-rule review covers the actual content)
    - '!**/AnalyzerReleases.Shipped.md'
    - '!**/AnalyzerReleases.Unshipped.md'

  auto_review:
    enabled: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0
    drafts: true
    ignore_title_keywords:
      - '[skip review]'
    ignore_usernames:
      - 'renovate[bot]'

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
    simplify:
      enabled: true
    # v2 ADD: Pro+ autofix-first recipes. Repo-agnostic — they apply
    # wherever the patterns exist; no-op elsewhere.
    custom:
      - enabled: true
        name: autofix public XML doc gaps
        instructions: >-
          For each public/protected/internal-with-InternalsVisibleTo symbol
          added in this PR that lacks XML docs (C#) or TSDoc (TS/TSX),
          generate them. Document intent, contracts, cancellation, exceptions,
          compatibility. Skip private implementation members. Don't restate
          the method name or rephrase the type signature.
      - enabled: true
        name: autofix sync-over-async / cancellation gaps
        instructions: >-
          Where a public or internal async method lacks a CancellationToken
          parameter, add `CancellationToken cancellationToken = default` and
          thread it through. Where `.Result` / `.Wait()` / `.GetAwaiter().GetResult()`
          blocks an async path, rewrite to await. Don't suppress with
          `#pragma` — fix or leave a precise comment explaining why no fix
          is possible.
      - enabled: true
        name: autofix missing test coverage on changed public behavior
        instructions: >-
          For each new public function/class/endpoint added in this PR with
          no corresponding test under `tests/` or `test/`, generate a focused
          test using the repo's existing test stack (xUnit v3, vitest, pytest,
          etc.). Cover the positive case + at least one negative case. Don't
          generate snapshot tests unless the repo already uses them.
      - enabled: true
        name: autofix obvious simplifications on changed lines
        instructions: >-
          Within the diff's changed lines only (not the surrounding file),
          collapse trivially-removable indirection: unused locals, redundant
          boolean ternaries, single-use intermediate variables, switch
          expressions where the if-else is single-arm. Don't touch code
          outside the diff hunks. Don't reformat unrelated code.
      - enabled: true
        name: autofix security obvious-fixes
        instructions: >-
          For obvious security issues introduced in this PR — secrets in
          plain text, path traversal sources without sanitization, SQL string
          concatenation, unsafe deserialization defaults — apply the minimal
          fix (env var lookup, path validator, parameterized query, safe
          deserialization options). Leave a comment for anything that needs
          architectural judgment instead of guessing.

  # Hard gates are off in the baseline — they are repo-specific. qyl,
  # ANcpLua.Analyzers, and Qyl.OpenTelemetry.SemanticConventions keep their
  # own pre_merge_checks block in their per-repo .coderabbit.yaml.
  pre_merge_checks:
    docstrings:
      mode: 'off'
    title:
      mode: warning
    description:
      mode: warning
    issue_assessment:
      mode: 'off'

  tools:
    ast-grep:
      essential_rules: true
    markdownlint:
      enabled: true
    hadolint:
      enabled: true
    shellcheck:
      enabled: true
    gitleaks:
      enabled: true
    actionlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 900000
    presidio:
      enabled: true
    biome:
      enabled: true
    languagetool:
      enabled: false
    ruff:
      enabled: false
    golangci-lint:
      enabled: false
    phpstan:
      enabled: false
    phpmd:
      enabled: false
    phpcs:
      enabled: false
    swiftlint:
      enabled: false
    detekt:
      enabled: false
    pmd:
      enabled: false
    semgrep:
      enabled: false
    opengrep:
      enabled: false
    trufflehog:
      enabled: false
    checkov:
      enabled: false
    tflint:
      enabled: false
    eslint:
      enabled: false
    flake8:
      enabled: false
    rubocop:
      enabled: false
    buf:
      enabled: false
    regal:
      enabled: false
    clang:
      enabled: false
    cppcheck:
      enabled: false
    circleci:
      enabled: false
    clippy:
      enabled: false
    sqlfluff:
      enabled: false
    trivy:
      enabled: false
    prismaLint:
      enabled: false
    pylint:
      enabled: false
    oxc:
      enabled: false
    shopifyThemeCheck:
      enabled: false
    luacheck:
      enabled: false
    brakeman:
      enabled: false
    dotenvLint:
      enabled: false
    htmlhint:
      enabled: false
    stylelint:
      enabled: false
    checkmake:
      enabled: false
    osvScanner:
      enabled: false
    blinter:
      enabled: false
    yamllint:
      enabled: false
    psscriptanalyzer:
      enabled: false

chat:
  auto_reply: true
  art: false
  allow_non_org_members: false
  integrations:
    jira:
      usage: disabled
    linear:
      usage: disabled

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
  code_guidelines:
    enabled: true
    # v2 EXPAND: include build infra + per-package READMEs so CR knows the
    # framework conventions every repo inherits.
    filePatterns:
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - '**/CLAUDE.md'
      - '**/AGENTS.md'
      - '.editorconfig'
      - 'README.md'
      - 'docs/**/*.md'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'Version.props'
      - 'package.json'
      - 'pnpm-workspace.yaml'
  jira:
    usage: disabled
  linear:
    usage: disabled
  mcp:
    usage: enabled

issue_enrichment:
  auto_enrich:
    enabled: true
  planning:
    enabled: true
    auto_planning:
      enabled: true
      labels:
        - 'plan:auto'
        - 'good-first-issue'
        - 'help-wanted'
  labeling:
    # Issue labels are safe to auto-apply (issue-event != PR-event, no review
    # retry-loop risk on issues).
    auto_apply_labels: true
