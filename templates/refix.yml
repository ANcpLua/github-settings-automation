# Template: copy this file into a target repo at .github/workflows/refix.yml
#
# Synced by .github/workflows/enforce-repo-settings.yml. Pinned by SHA on
# every refresh.
#
# Requires:
#   - Secret REFIX_CLASSIC_PAT — classic PAT with scopes:
#       repo, workflow, read:org, read:discussion
#     Classic PATs cannot be repo-scoped the way fine-grained PATs can.
#   - Secret CLAUDE_CODE_OAUTH_TOKEN — generated via `claude setup-token`.
#
# Label-gated by design. Do NOT add a schedule trigger and do NOT let the
# action auto-merge — it writes non-deterministic code via Claude.

name: refix

on:
  pull_request:
    types: [labeled]

jobs:
  refix:
    if: github.event.label.name == 'refix'
    runs-on: ubuntu-latest
    steps:
      - uses: HappyOnigiri/Refix@e0731daee880e3f43498a6da6d1d2133ad848dd9 # v1.4.0
        env:
          GH_TOKEN: ${{ secrets.REFIX_CLASSIC_PAT }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
