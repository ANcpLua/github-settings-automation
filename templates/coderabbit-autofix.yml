name: CodeRabbit Autofix

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      target:
        description: "Specific PR to process as owner/repo#N. Blank means use this repository event context."
        required: false
        type: string
      mode:
        description: "Autofix delivery mode"
        required: false
        type: choice
        options:
          - stacked_pr
          - direct_commit
        default: stacked_pr

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: coderabbit-autofix-${{ github.event.pull_request.number || inputs.target || github.run_id }}
  cancel-in-progress: false

jobs:
  request-autofix:
    name: Request CodeRabbit Autofix
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(fromJSON('["coderabbitai[bot]", "coderabbitai"]'), github.event.review.user.login)
    runs-on: ubuntu-latest
    steps:
      - name: Ask CodeRabbit for a separate Autofix pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPLICIT_TARGET: ${{ inputs.target }}
          MODE: ${{ inputs.mode || 'stacked_pr' }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PATH: ${{ github.event_path }}
        run: |
          set -euo pipefail

          if [ -n "${EXPLICIT_TARGET:-}" ]; then
            repo="${EXPLICIT_TARGET%#*}"
            pr="${EXPLICIT_TARGET#*#}"
            if [ "$repo" = "$EXPLICIT_TARGET" ] || [ -z "$repo" ] || [ -z "$pr" ]; then
              echo "::error::target must use owner/repo#N"
              exit 1
            fi
            head="$(gh pr view "$pr" --repo "$repo" --json headRefOid --jq '.headRefOid')"
            review_id="manual-$head"
          else
            repo="$GITHUB_REPOSITORY"
            pr="$(jq -r '.pull_request.number // empty' "$EVENT_PATH")"
            head="$(jq -r '.pull_request.head.sha // empty' "$EVENT_PATH")"
            review_id="$(jq -r '.review.id // empty' "$EVENT_PATH")"
            reviewer="$(jq -r '.review.user.login // empty' "$EVENT_PATH")"
            if [ "$EVENT_NAME" != "workflow_dispatch" ]; then
              case "$reviewer" in
                coderabbitai|coderabbitai'[bot]') ;;
                *) echo "review by $reviewer is not CodeRabbit; skipping"; exit 0 ;;
              esac
            fi
          fi

          if [ -z "${pr:-}" ] || [ -z "${head:-}" ]; then
            echo "::error::could not resolve PR number and head SHA"
            exit 1
          fi

          comment_count="$(
            gh api "repos/$repo/pulls/$pr/comments" --paginate \
              --jq "[.[] | select((.user.login == \"coderabbitai[bot]\" or .user.login == \"coderabbitai\") and (.commit_id == \"$head\" or .original_commit_id == \"$head\"))] | length" \
              | awk '{s += $1} END {print s + 0}'
          )"

          if [ "$comment_count" -eq 0 ]; then
            echo "$repo#$pr: CodeRabbit review had no inline comments at $head; Autofix would no-op"
            exit 0
          fi

          marker="<!-- coderabbit-autofix:requested $head -->"
          existing="$(
            gh api "repos/$repo/issues/$pr/comments" --paginate \
              --jq "[.[] | select(.body | contains(\"$marker\"))] | length" \
              | awk '{s += $1} END {print s + 0}'
          )"

          if [ "$existing" -ne 0 ]; then
            echo "$repo#$pr: Autofix already requested for $head"
            exit 0
          fi

          case "$MODE" in
            stacked_pr) command='@coderabbitai autofix stacked pr' ;;
            direct_commit) command='@coderabbitai autofix' ;;
            *) echo "::error::unsupported mode: $MODE"; exit 1 ;;
          esac

          body="$(cat <<EOF
          $command

          $marker
          Triggered automatically after CodeRabbit review $review_id posted $comment_count inline comment(s) on head $head.

          Use a separate CodeRabbit Autofix pass. Do not treat the original review pass as the repair agent.
          EOF
          )"

          gh api "repos/$repo/issues/$pr/comments" --method POST \
            -f "body=$body" \
            --silent
          echo "$repo#$pr: posted $command for $head"

