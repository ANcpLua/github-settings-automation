# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# CANONICAL — owned by ANcpLua/github-settings-automation/templates/nuget-publish.yml.
# DO NOT EDIT in the consumer repo. Edits will be overwritten by the next
# sync run of enforce-repo-settings.yml.
#
# Algorithm:
#   - Triggered by `v*` tag push OR manual workflow_dispatch with an input
#     `version` (without the leading `v`).
#   - Discovers the repo's `.slnx` or `.sln` at the repo root, restores +
#     builds it with the version override, packs the whole solution,
#     pushes every produced `.nupkg` to nuget.org and GitHub Packages.
#
# Auth model: NuGet TRUSTED PUBLISHING via OIDC (no static API key).
#   - `id-token: write` permission gives the runner a short-lived OIDC
#     token. `NuGet/login@v1` exchanges it for a TEMPORARY (per-job) API
#     key. That key is only valid for ~30 min and is used only on this
#     single workflow run.
#   - Requires three things to exist:
#       a) A Trusted Publisher policy on nuget.org/account/trustedpublishers
#          matching this repo + this workflow file (+ optional environment).
#          Filling in the form with Workflow File = `nuget-publish.yml`
#          authorizes every package owned by the same Package Owner.
#       b) `NUGET_USER` repo secret on the consumer repo (the nuget.org
#          username, e.g. `ANcpLua`). The `NuGet/login` action embeds
#          this in the OIDC token exchange.
#       c) The Trusted Publisher policy's "Package Owner" must own every
#          package being pushed (PackageId mismatch = 401 on push).
#   - No `NUGET_API_KEY` secret needed. Rotation is automatic — keys live
#     only for the workflow run.
#
# Opt-out:
#   - To deliberately diverge from canonical in one specific repo, add a
#     line `# CANONICAL-DEPARTURE: <reason>` at the top of the consumer
#     repo's copy. The sync script honors that marker and won't overwrite.
#   - Reasons for departure: needs Authenticode signing, multi-stage
#     release pipeline, custom PackageId override (e.g. AL's `Dummy`
#     trick — to be migrated separately).
#
# Why this is canonical and not per-repo:
#   - Eliminates the failure mode where QYL was missing nuget-publish.yml
#     entirely (PRD assumed it existed; tag-push was a silent no-op).
#   - Future bumps to action majors / NuGet protocol / GitHub Packages auth
#     land in ONE place and propagate to every publishable repo on the
#     next sync sweep.

name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix, e.g. 3.0.0)'
        required: true

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/Directory.Packages.props'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Discover solution
        id: sln
        run: |
          slnx="$(find . -maxdepth 1 -type f -name '*.slnx' -print -quit | sed 's#^\./##')"
          [ -z "$slnx" ] && slnx="$(find . -maxdepth 1 -type f -name '*.sln' -print -quit | sed 's#^\./##')"
          [ -z "$slnx" ] && { echo "::error::no .slnx or .sln at repo root"; exit 1; }
          echo "Solution: $slnx"
          echo "slnx=$slnx" >> "$GITHUB_OUTPUT"

      - name: Restore (no Version override — uses last-published self-references)
        run: dotnet restore "${{ steps.sln.outputs.slnx }}"

      - name: Build (Version override applied here)
        run: |
          dotnet build "${{ steps.sln.outputs.slnx }}" \
            -c Release --no-restore \
            -p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: |
          dotnet pack "${{ steps.sln.outputs.slnx }}" \
            -c Release --no-build \
            -o artifacts \
            -p:Version=${{ steps.version.outputs.version }}
          ls -la artifacts/

      - name: NuGet login (OIDC → temp API key)
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org (trusted publishing)
        run: |
          shopt -s nullglob
          pkgs=(artifacts/*.nupkg)
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "::warning::no .nupkg artifacts produced; nothing to publish"
            exit 0
          fi
          for p in "${pkgs[@]}"; do echo "Pushing $p"; done
          dotnet nuget push "${pkgs[@]}" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate

      - name: Push to GitHub Packages
        run: |
          shopt -s nullglob
          pkgs=(artifacts/*.nupkg)
          [ ${#pkgs[@]} -eq 0 ] && exit 0
          dotnet nuget push "${pkgs[@]}" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate
